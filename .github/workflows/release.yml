name: Build Executable

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build executable
        run: bun build --compile server.js --outfile dist/chat-overlay

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force
          Copy-Item dist\chat-overlay.exe release\
          Copy-Item -Recurse public release\public
          Compress-Archive -Path release\* -DestinationPath chat-overlay-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-overlay-windows
          path: chat-overlay-windows.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} chat-overlay-windows.zip --generate-notes --title "Chat Overlay ${{ github.ref_name }}"
